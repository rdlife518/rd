<html lang="zh-TW">

        #welcome-stage { text-align: left; max-width: 500px; margin: 0 auto; }

        label { display: block; font-weight: bold; margin-bottom: 8px; color: #334155; font-size: 15px; }

        input[type="text"]:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        /* 性別切換按鈕視覺 */
        .radio-group { display: flex; gap: 12px; }
        .radio-label { flex: 1; text-align: center; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-weight: bold; transition: all 0.2s; background: #fff; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .radio-label { border-color: var(--primary); background: #eff6ff; color: var(--primary); }

        .user-summary { background: #eff6ff; color: #1e40af; padding: 10px 15px; border-radius: 8px; font-size: 14px; margin-bottom: 15px; text-align: left; border-left: 4px solid var(--primary); }
        .shasha-line { color: #b91c1c; font-size: 14px; margin-top: 5px; }
        
        /* 豪華六爻盤面 */

        .cell-fushen { width: 130px; color: #2563eb; font-size: 14px; text-align: left; }
        .cell-liuqin { width: 60px; color: #b91c1c; text-align: left; }
        .cell-shiying { width: 40px; color: #2563eb; text-align: center; }
        .cell-graph { width: 110px; display: flex; align-items: center; justify-content: center; }
        .cell-ganzhi { width: 90px; color: #047857; text-align: left; }
        .cell-dong { width: 50px; color: #ef4444; text-align: center; font-size: 18px; }
        .cell-bian { width: 220px; color: #475569; padding-left: 15px; border-left: 1px dashed #cbd5e1; }

        .yin { display: flex; width: 90px; height: 14px; justify-content: space-between; }
        .yin .part { width: 38px; height: 14px; background-color: #1e293b; border-radius: 2px; }

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪華文王卦 - 純淨安全版</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: #f1f5f9; color: #1e293b; padding: 20px; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 600px; width: 100%; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        h1 { color: #1e3a8a; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn { background-color: #2563eb; color: white; border: none; padding: 14px 28px; font-size: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:hover { background-color: #1d4ed8; }
        #divination-stage { display: none; }
        .pan-box { background: #0f172a; color: #fff; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; font-family: monospace; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="welcome-stage">
            <h1>豪華六爻文王卦占卜</h1>
            <p style="color: #64748b;">請輸入您想請示的問題，開啟占卜儀式</p>
            <input type="text" id="user-question" placeholder="例如：今年換工作發展順利嗎？">
            <button class="btn" onclick="startGua()">進入占卜儀式 ➔</button>
        </div>

        <div id="divination-stage">
            <h1>起卦排盤室</h1>
            <p id="summary-text" style="background:#eff6ff; color:#1e40af; padding:10px; border-radius:8px; font-weight:bold;"></p>
            <button id="cast-btn" class="btn" style="background-color:#10b981;" onclick="clickCoin()">🪙 模擬擲硬幣（點擊 6 次）</button>
            
            <div class="pan-box" id="pan-area"></div>
            <button class="btn" style="background-color:#64748b; margin-top:15px; font-size:14px; padding:8px;" onclick="location.reload()">重新輸入</button>
        </div>
    </div>

    <script>
        let clicks = 0;
        let question = "";

        function startGua() {
            let input = document.getElementById('user-question');
            if(!input.value.trim()) {
                alert("請輸入問題！");
                return;
            }
            question = input.value;
            document.getElementById('summary-text').innerText = "請示所求：「" + question + "」";
            document.getElementById('welcome-stage').style.display = "none";
            document.getElementById('divination-stage').style.display = "block";
        }

        function clickCoin() {
            clicks++;
            if (clicks < 6) {
                document.getElementById('cast-btn').innerText = "🪙 模擬擲硬幣（已擲 " + clicks + " 次）";
            } else {
                document.getElementById('cast-btn').innerText = "🎉 起卦完成！";
                document.getElementById('cast-btn').disabled = true;
                
                // 亂數產生本卦與變卦
                let guas = ["山雷頤", "風地觀", "乾為天", "坤為地", "水雷屯", "地天泰", "天地否"];
                let ben = guas[Math.floor(Math.random() * guas.length)];
                let bian = guas[Math.floor(Math.random() * guas.length)];
                
                let pan = document.getElementById('pan-area');
                pan.innerHTML = "<h3 style='text-align:center;color:#f59e0b;margin-top:0;'>【神準排盤結果】</h3>" +
                                "<p>【本卦】" + ben + "</p>" +
                                "<p>【變卦】" + bian + "</p>" +
                                "<p>【六獸】青龍、朱雀、勾陳、滕蛇、白虎、玄武 已自動安臨</p>" +
                                "<p style='color:#a7f3d0;'>※ 提示：這代表您的起卦大門已經完美修復成功！</p>";
                pan.style.display = "block";
            }
        }
    </script>

</body>
</html>
